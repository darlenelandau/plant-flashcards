<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карточки растений</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', serif;
    background: #f0f4f0;
    min-height: 100vh;
    padding: 32px 16px;
  }

  h1 {
    text-align: center;
    font-size: 1.8rem;
    color: #2d5a27;
    margin-bottom: 8px;
    font-weight: normal;
    letter-spacing: 0.03em;
  }

  .subtitle {
    text-align: center;
    color: #7a9e76;
    font-size: 0.95rem;
    margin-bottom: 16px;
    font-style: italic;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
    max-width: 1300px;
    margin: 0 auto;
  }

  .card-wrap {
    perspective: 900px;
    height: 300px;
    cursor: pointer;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0.2, 0.2, 1);
    border-radius: 14px;
  }

  .card-wrap.flipped .card {
    transform: rotateY(180deg);
  }

  .front, .back {
    position: absolute;
    inset: 0;
    border-radius: 14px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 14px 18px;
    text-align: center;
    box-shadow: 0 4px 18px rgba(45, 90, 39, 0.13), 0 1px 4px rgba(0,0,0,0.06);
    overflow: hidden;
  }

  .front {
    background: linear-gradient(145deg, #ffffff, #eef5ec);
    border: 1.5px solid #c8dec4;
    justify-content: flex-start;
  }

  .back {
    background: linear-gradient(145deg, #2d5a27, #3d7a35);
    transform: rotateY(180deg);
    border: 1.5px solid #4a9040;
    justify-content: center;
  }

  .front .plant-img {
    width: 100%;
    height: 170px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 12px;
    background: #e0ebe0;
  }

  .front .no-img {
    width: 100%;
    height: 170px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    opacity: 0.25;
    background: #e8f0e6;
    border-radius: 8px;
    margin-bottom: 12px;
  }

  .front .label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #a8c5a0;
    margin-bottom: 6px;
    font-family: sans-serif;
  }

  .front .name-ru {
    font-size: 1rem;
    color: #2d5a27;
    font-weight: bold;
    line-height: 1.3;
  }

  .back .label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.13em;
    color: #a8d9a0;
    margin-bottom: 10px;
    font-family: sans-serif;
  }

  .back .name-la {
    font-size: 1.15rem;
    color: #ffffff;
    font-style: italic;
    line-height: 1.4;
    padding: 0 10px;
  }

  .number {
    position: absolute;
    bottom: 8px;
    right: 12px;
    font-size: 0.65rem;
    font-family: sans-serif;
  }
  .front .number { color: #c8dec4; }
  .back  .number { color: rgba(255,255,255,0.35); }

  .hint {
    text-align: center;
    color: #9ab896;
    font-size: 0.82rem;
    margin-bottom: 24px;
    font-family: sans-serif;
  }

  .counter {
    text-align: center;
    color: #7a9e76;
    font-size: 0.88rem;
    margin-top: 36px;
    font-family: sans-serif;
  }
</style>
</head>
<body>

<h1>🌿 Растения</h1>
<p class="subtitle">Русские и латинские названия</p>
<p class="hint">Нажмите на карточку, чтобы увидеть латинское название</p>

<div class="grid" id="grid"></div>
<p class="counter" id="counter"></p>

<script>
const plants = [
  ["Калужница болотная", "Caltha palustris"],
  ["Ветреница дубравная", "Anemone nemorosa"],
  ["Лютик едкий", "Ranunculus acris"],
  ["Лютик ползучий", "Ranunculus repens"],
  ["Земляника лесная", "Fragaria vesca"],
  ["Гравилат речной", "Geum rivale"],
  ["Малина обыкновенная", "Rubus idaeus"],
  ["Вишня обыкновенная", "Cerasus vulgaris"],
  ["Черёмуха обыкновенная", "Padus avium"],
  ["Груша садовая", "Pyrus communis"],
  ["Яблоня домашняя", "Malus domestica"],
  ["Донник белый", "Melilotus albus"],
  ["Горох посевной", "Pisum sativum"],
  ["Вика посевная", "Vicia sativa"],
  ["Вика мышиная", "Vicia cracca"],
  ["Бобы конские", "Vicia faba"],
  ["Чина луговая", "Lathyrus pratensis"],
  ["Хлопчатник волосистый", "Gossypium hirsutum"],
  ["Лён обыкновенный", "Linum usitatissimum"],
  ["Морковь посевная", "Daucus sativus"],
  ["Укроп пахучий", "Anethum graveolens"],
  ["Тмин обыкновенный", "Carum carvi"],
  ["Купырь лесной", "Anthriscus sylvestris"],
  ["Сныть обыкновенная", "Aegopodium podagraria"],
  ["Вех ядовитый", "Cicuta virosa"],
  ["Картофель", "Solanum tuberosum"],
  ["Томат", "Lycopersicon esculentum"],
  ["Вьюнок полевой", "Convolvulus arvensis"],
  ["Погремок осенний", "Rhinanthus serotinus"],
  ["Пикульник красивый", "Galeopsis speciosa"],
  ["Яснотка белая", "Lamium album"],
  ["Будра плющевидная", "Glechoma hederacea"],
  ["Крапива двудомная", "Urtica dioica"],
  ["Щавель кислый", "Rumex acetosa"],
  ["Спорыш птичий", "Polygonum aviculare"],
  ["Гречиха посевная", "Fagopyrum esculentum"],
  ["Свёкла обыкновенная", "Beta vulgaris"],
  ["Марь белая", "Chenopodium album"],
  ["Звездчатка средняя", "Stellaria media"],
  ["Мак самосейка", "Papaver rhoeas"],
  ["Капуста огородная", "Brassica oleracea"],
  ["Горчица полевая", "Sinapis arvensis"],
  ["Сурепка обыкновенная", "Barbarea vulgaris"],
  ["Редька посевная", "Raphanus sativus"],
  ["Свербига восточная", "Bunias orientalis"],
  ["Редька дикая", "Raphanus raphanistrum"],
  ["Огурец посевной", "Cucumis sativus"],
  ["Тыква обыкновенная", "Cucurbita pepo"],
  ["Подсолнечник однолетний", "Helianthus annuus"],
  ["Нивяник обыкновенный", "Leucanthemum vulgare"],
  ["Полынь обыкновенная", "Artemisia vulgaris"],
  ["Мать-и-мачеха", "Tussilago farfara"],
  ["Бодяк полевой", "Cirsium arvense"],
  ["Ромашка непахучая", "Matricaria perforata"],
  ["Одуванчик лекарственный", "Taraxacum officinale"],
  ["Василёк синий", "Centaurea cyanus"],
  ["Осот полевой", "Sonchus arvensis"],
  ["Лук репчатый", "Allium cepa"],
  ["Осока чёрная", "Carex nigra"],
  ["Пшеница твёрдая", "Triticum durum"],
  ["Пшеница мягкая", "Triticum aestivum"],
  ["Кукуруза", "Zea mays"],
  ["Овёс посевной", "Avena sativa"],
  ["Ячмень обыкновенный", "Hordeum vulgare"],
  ["Рожь посевная", "Secale cereale"],
  ["Пырей ползучий", "Elytrigia repens"],
  ["Плевел многолетний", "Lolium perenne"],
  ["Тимофеевка луговая", "Phleum pratense"],
  ["Лисохвост луговой", "Alopecurus pratensis"],
  ["Кострец безостый", "Bromopsis inermis"],
  ["Овсяница луговая", "Festuca pratensis"],
  ["Овсяница красная", "Festuca rubra"],
  ["Полевица гигантская", "Agrostis gigantea"],
  ["Ежа сборная", "Dactylis glomerata"],
  ["Мятлик луговой", "Poa pratensis"],
];

// Set of Latin names that have an image in images/<slug>.jpg
const withImage = new Set([
  "Caltha palustris","Anemone nemorosa","Ranunculus acris","Ranunculus repens",
  "Fragaria vesca","Geum rivale","Rubus idaeus","Cerasus vulgaris","Pyrus communis",
  "Malus domestica","Melilotus albus","Pisum sativum","Vicia sativa","Vicia cracca",
  "Vicia faba","Daucus sativus","Anethum graveolens","Carum carvi","Anthriscus sylvestris",
  "Aegopodium podagraria","Solanum tuberosum","Lycopersicon esculentum","Fagopyrum esculentum",
  "Brassica oleracea","Barbarea vulgaris","Raphanus sativus","Bunias orientalis",
  "Helianthus annuus","Leucanthemum vulgare","Artemisia vulgaris","Tussilago farfara",
  "Cirsium arvense","Matricaria perforata","Taraxacum officinale","Centaurea cyanus",
  "Sonchus arvensis","Triticum durum","Triticum aestivum","Zea mays","Avena sativa",
  "Hordeum vulgare","Secale cereale","Elytrigia repens","Lolium perenne","Phleum pratense",
  "Alopecurus pratensis","Bromopsis inermis","Festuca pratensis","Dactylis glomerata",
  "Poa pratensis","Agrostis gigantea"
]);

const grid = document.getElementById('grid');

plants.forEach(([ru, la], i) => {
  const wrap = document.createElement('div');
  wrap.className = 'card-wrap';
  const slug = la.toLowerCase().replace(/ /g, '-');
  const imgHtml = withImage.has(la)
    ? `<img class="plant-img" src="images/${slug}.jpg" alt="${la}" loading="lazy">`
    : `<div class="no-img">🌿</div>`;

  wrap.innerHTML = `
    <div class="card">
      <div class="front">
        ${imgHtml}
        <div class="label">Русское название</div>
        <div class="name-ru">${ru}</div>
        <div class="number">${i + 1}</div>
      </div>
      <div class="back">
        <div class="label">Латинское название</div>
        <div class="name-la">${la}</div>
        <div class="number">${i + 1}</div>
      </div>
    </div>`;

  wrap.addEventListener('click', () => wrap.classList.toggle('flipped'));
  grid.appendChild(wrap);
});

document.getElementById('counter').textContent = `Всего карточек: ${plants.length}`;
</script>
</body>
</html>
